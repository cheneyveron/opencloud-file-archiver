name: Publish file archiver service image

on:
  push:
    branches:
      - main
    paths:
      - file-archiver-service/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-file-archiver-service-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencloud-file-archiver-service

jobs:
  publish:
    name: Test, build, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: file-archiver-service/go.mod
          cache-dependency-path: file-archiver-service/go.sum

      - name: Test service
        working-directory: file-archiver-service
        run: go test ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=sha,prefix=,format=long
          labels: |
            org.opencontainers.image.title=OpenCloud File Archiver Service
            org.opencontainers.image.description=Backend archive and extraction service for OpenCloud Web

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: file-archiver-service
          file: file-archiver-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
